services:
  - type: web
    name: ammas-farm
    runtime: python
    buildCommand: pip install -r ammas_farm/requirements.txt
    startCommand: gunicorn --chdir ammas_farm app:app
    envVars:
      - key: SECRET_KEY
        sync: false  # Set a strong random secret in Render dashboard
      - key: DATABASE_URL
        sync: false  # Paste your Neon DB connection string here
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0