{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <h1>👤 My Profile</h1>
    <p>Manage your account details</p>
  </div>
</div>
<div class="container">
  <div class="form-card" style="max-width:620px;">
    <form method="POST" action="{{ url_for('profile') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <h3 class="section-title">Personal Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" class="form-control"
                 value="{{ current_user['first_name'] }}" placeholder="First name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" class="form-control"
                 value="{{ current_user['last_name'] }}" placeholder="Last name" />
        </div>
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" class="form-control"
               value="{{ current_user['email'] }}" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone_number" class="form-control"
               value="{{ current_user['phone_number'] }}" placeholder="+91 XXXXX XXXXX" />
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <textarea name="address" class="form-control" rows="3"
                  placeholder="Your default delivery address">{{ current_user['address'] }}</textarea>
      </div>

      <h3 class="section-title" style="margin-top:2rem;">Change Password</h3>
      <p class="text-muted small">Leave blank to keep your current password.</p>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" class="form-control"
               placeholder="Enter current password" />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" class="form-control"
               placeholder="New password" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('shop') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
